services:
  echo-server:
    build:
      context: ./server
    container_name: echo-server
    environment:
      HOST: 0.0.0.0
      PORT: "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,sys;s=socket.socket();s.settimeout(1);ok=True\ntry:\n s.connect(('127.0.0.1',5000))\nexcept OSError:\n ok=False\nfinally:\n s.close()\nsys.exit(0 if ok else 1)"]
      interval: 2s
      timeout: 1s
      retries: 5
    ports:
      - "5000:5000"

  echo-client:
    build:
      context: ./client
    container_name: echo-client
    depends_on:
      echo-server:
        condition: service_healthy
    environment:
      ECHO_HOST: echo-server
      ECHO_PORT: "5000"
      ECHO_MESSAGE: "Mensagem via Docker Compose"
