services:
  echo-server:
    build:
      context: ./server
    container_name: echo-server
    environment:
      HOST: 0.0.0.0
      PORT: "5000"
    ports:
      - "5000:5000"

  echo-client:
    build:
      context: ./client
    container_name: echo-client
    depends_on:
      - echo-server
    environment:
      ECHO_HOST: echo-server
      ECHO_PORT: "5000"
      ECHO_MESSAGE: "Mensagem via Docker Compose"
